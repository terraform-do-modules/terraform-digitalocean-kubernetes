name: Security Scan

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  checkov:
    if: github.actor != 'dependabot[bot]'
    uses: clouddrove/github-shared-workflows/.github/workflows/security-checkov.yml@v2
    with:
      directory: '.'
      continue_on_error: 'true'
      skip_check: 'CKV_TF_1'
