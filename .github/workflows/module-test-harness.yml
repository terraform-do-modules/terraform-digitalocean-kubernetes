name: Module Test Harness

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  basic-example:
    uses: clouddrove/github-shared-workflows/.github/workflows/stf-checks.yml@f1ee54ff38b0eaaed9be6f5d184438c9b8a5b7eb
    with:
      provider: digitalocean
      working_directory: ./_examples/basic/

  complete-example:
    uses: clouddrove/github-shared-workflows/.github/workflows/stf-checks.yml@f1ee54ff38b0eaaed9be6f5d184438c9b8a5b7eb
    with:
      provider: digitalocean
      working_directory: ./_examples/complete/

  soc2-baseline-example:
    uses: clouddrove/github-shared-workflows/.github/workflows/stf-checks.yml@f1ee54ff38b0eaaed9be6f5d184438c9b8a5b7eb
    with:
      provider: digitalocean
      working_directory: ./_examples/soc2-baseline/
